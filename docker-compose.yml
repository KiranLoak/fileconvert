# docker-compose.yml — Test your production Docker build locally
#
# Usage:
#   docker compose up --build          # build and start
#   docker compose up -d --build       # start in background
#   docker compose logs -f             # tail logs
#   docker compose down                # stop and remove containers
#
# Then open http://localhost:5000

version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      # Base URL must match how you access the app (used in output file URLs)
      BASE_URL: http://localhost:5000
      MAX_FILE_SIZE_MB: 50
      FILE_EXPIRY_MINUTES: 30
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    volumes:
      # Mount uploads/outputs outside the container so files persist between restarts.
      # Remove these lines on platforms like Railway that have ephemeral storage.
      - ./data/uploads:/app/server/uploads
      - ./data/outputs:/app/server/outputs
      - ./data/logs:/app/server/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
